name: fiservtrack
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  device_info_plus: ^13.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  http: ^1.6.0
  encrypt: ^5.0.3
  basic_utils: ^5.7.0
  shared_preferences: ^2.5.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true